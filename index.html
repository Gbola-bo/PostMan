<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>PostMann</title>
<meta name="theme-color" content="#fb3662">
<link rel="icon" type="image/png" sizes="32x32" href="assets/icon-32.png">
<link rel="apple-touch-icon" href="assets/icon-180.png">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="home.css">
</head>
<body class="home-body">

<div class="home-stage">
  <div class="home-pill home-pill-1">Posts</div>
  <div class="home-pill home-pill-2">Gist</div>
  <div class="home-pill home-pill-3">Content</div>
  <img src="assets/cursor-accent.svg" alt="" class="home-cursor home-cursor-1">

  <img src="assets/logo-full.svg" alt="PostMann" class="home-logo">

  <div class="home-pill home-pill-4">Carousel</div>
  <img src="assets/cursor-accent.svg" alt="" class="home-cursor home-cursor-2">
  <div class="home-pill home-pill-5">GIF</div>
  <div class="home-pill home-pill-6">.PNG</div>

  <div class="home-actions">
    <a href="app.html" class="home-action-link" id="getStartedLink">Get Started</a>
    <a href="vet.html" class="home-action-link home-action-secondary" id="templateToolLink">Template tool</a>
  </div>
</div>

<script>
  // Plays a clean swipe-up-and-fade exit before navigating, instead of
  // the page just jumping. Applied to both links so the experience feels
  // consistent regardless of which one is tapped.
  const EXIT_MS = 420;
  const stage = document.querySelector('.home-stage');
  function navigateWithExit(e, href) {
    e.preventDefault();
    stage.classList.add('is-leaving');
    setTimeout(() => { window.location.href = href; }, EXIT_MS);
  }
  document.getElementById('getStartedLink').addEventListener('click', (e) => navigateWithExit(e, 'app.html'));
  document.getElementById('templateToolLink').addEventListener('click', (e) => navigateWithExit(e, 'vet.html'));
</script>
</body>
</html>
