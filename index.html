<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>PostMann</title>
<meta name="theme-color" content="#FF634F">
<link rel="icon" type="image/png" sizes="32x32" href="assets/icon-32.png">
<link rel="apple-touch-icon" href="assets/icon-180.png">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="home.css">
</head>
<body class="home-body">

<div class="home-wrap" id="homeWrap">

  <!-- ===== Coral hero section ===== -->
  <section class="home-hero">

    <!-- z:0 — Base gradient (border-radius: 0 0 0 50px from Figma) -->
    <div class="hero-bg"></div>

    <!-- z:1 — Background icon: logo-icon at 22% opacity, offset X:-173 Y:-228 -->
    <img class="hero-bg-icon" src="assets/logo-icon.svg" alt="">

    <!-- z:2 — Pills (below cursor, below waves per Figma layer order) -->
    <!-- mp4: x=146, y=473, rotation=-10.35° -->
    <div class="format-pill pill-mp4"><span>.mp4</span></div>
    <!-- png: x=114, y=509, rotation=1.6° -->
    <div class="format-pill pill-png"><span>.PNG</span></div>
    <!-- gif: x=143, y=536, rotation=-3.32° -->
    <div class="format-pill pill-gif"><span>.gif</span></div>

    <!-- z:3 — Cursor: x=135, y=549, rotation=-9.46° (above pills, below waves) -->
    <img class="hero-cursor" src="assets/cursor-accent.svg" alt="">

    <!-- z:4 — Wave rectangles: 25% opacity, ON TOP of pills+cursor (Figma layer order) -->
    <!-- This is what gives the pills their slightly blended/washed look -->
    <div class="wave-rect wave-1"></div>
    <div class="wave-rect wave-2"></div>

    <!-- z:5 — PostMann logo card (frontmost layer in coral section) -->
    <!-- top: 269/700 = 38.4% of coral, centered horizontally, 84% width -->
    <img class="hero-logo" src="assets/logo-white.svg" alt="PostMann">

  </section>

  <!-- ===== Cream footer section ===== -->
  <section class="home-footer">

    <div class="footer-card">
      <p class="footer-tagline">
        Got something to post <strong>today?</strong>
      </p>
      <a href="app.html" class="cta-btn" id="getStartedLink">
        <span class="cta-label">Let's Get Started</span>
        <span class="cta-icon">
          <img src="assets/logo-icon.svg" alt="">
        </span>
      </a>
    </div>

    <a href="vet.html" class="footer-tool-link" id="templateToolLink">template tool</a>

  </section>

</div>

<script>
  const EXIT_MS = 420;
  const wrap = document.getElementById('homeWrap');
  function go(e, href) {
    e.preventDefault();
    wrap.classList.add('is-leaving');
    setTimeout(() => { window.location.href = href; }, EXIT_MS);
  }
  document.getElementById('getStartedLink').addEventListener('click', e => go(e, 'app.html'));
  document.getElementById('templateToolLink').addEventListener('click', e => go(e, 'vet.html'));
</script>
</body>
</html>
